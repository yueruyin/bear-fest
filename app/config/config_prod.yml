app:
  env: prod
  title: "Bear Fest Backend"
  version: "0.1.0"

server:
  host: "0.0.0.0"
  port: 8000

database:
  url: "sqlite:///./app_prod.db"

uploads:
  root_dir: "app/uploads"
  merchant_dir: "merchant"

cors:
  allow_origins: ["*"]
  allow_credentials: true

jwt:
  # 管理后台 JWT 密钥（生产请替换为强随机字符串）
  admin_secret: "prod-change-me"
  # token 有效期（分钟）
  expires_minutes: 720

